<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GovtPrep Premium | AE & JE Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .pw-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.3); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2.5 rounded-2xl text-white shadow-lg shadow-blue-200">
                        <i data-lucide="zap" class="w-6 h-6"></i>
                    </div>
                    <span class="text-2xl font-black tracking-tighter text-slate-900">GOVTPREP<span class="text-blue-600">.PRO</span></span>
                </div>
                
                <div id="auth-state" class="flex items-center gap-4">
                    <div class="h-10 w-24 bg-slate-100 animate-pulse rounded-full"></div>
                </div>
            </div>
        </div>
    </nav>

    <header class="pw-gradient text-white pt-24 pb-40 relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 relative z-10 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 mb-8 bg-white/10 border border-white/20 rounded-full backdrop-blur-md">
                <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span></span>
                <span class="text-sm font-bold text-blue-100 uppercase tracking-widest">Live AE/JE Batches 2026</span>
            </div>
            <h1 class="text-5xl md:text-8xl font-black mb-8 leading-[1.1] tracking-tight">Your Success Is Our <br><span class="text-blue-300">Mission, Not Business.</span></h1>
            <p class="text-xl text-blue-100/70 max-w-3xl mx-auto mb-12 font-medium">Affordable, high-quality technical coaching for Electrical, Civil, and Mechanical Engineers. Start your journey to a Govt job today.</p>
            
            <div class="flex flex-col sm:flex-row justify-center gap-6">
                <button onclick="window.scrollTo({top: 600, behavior: 'smooth'})" class="bg-white text-blue-900 px-10 py-5 rounded-2xl font-bold text-lg shadow-2xl hover:bg-slate-50 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="graduation-cap"></i> Explore Batches
                </button>
                <button class="bg-blue-600/20 border border-white/30 backdrop-blur-md px-10 py-5 rounded-2xl font-bold text-lg hover:bg-blue-600/40 transition-all">
                    Free Study Material
                </button>
            </div>
        </div>
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-20 pointer-events-none">
            <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-400 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 right-0 w-80 h-80 bg-indigo-500 rounded-full blur-3xl"></div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-4 -mt-20 relative z-20 pb-24">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="batches-container">
            <div class="glass-card p-8 rounded-[2.5rem] h-80 animate-pulse bg-white/50"></div>
            <div class="glass-card p-8 rounded-[2.5rem] h-80 animate-pulse bg-white/50"></div>
            <div class="glass-card p-8 rounded-[2.5rem] h-80 animate-pulse bg-white/50"></div>
        </div>
    </section>

    <div id="loginModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl overflow-hidden relative">
            <button onclick="toggleModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900"><i data-lucide="x"></i></button>
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black text-slate-900">Welcome Back</h2>
                <p class="text-slate-500 mt-2 font-medium">Log in to continue your preparation</p>
            </div>
            <div class="space-y-5">
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-4 w-5 h-5 text-slate-400"></i>
                    <input id="email" type="email" placeholder="Email Address" class="w-full pl-12 pr-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:ring-2 focus:ring-blue-600 outline-none transition-all">
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-4 w-5 h-5 text-slate-400"></i>
                    <input id="password" type="password" placeholder="Password" class="w-full pl-12 pr-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:ring-2 focus:ring-blue-600 outline-none transition-all">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-800 transition-all active:scale-95">Sign In</button>
                
                <div class="relative flex items-center py-4">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="flex-shrink mx-4 text-slate-400 text-xs font-bold uppercase tracking-widest">Or login with</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>
                
                <button onclick="handleGoogleLogin()" class="w-full border-2 border-slate-100 py-4 rounded-2xl flex items-center justify-center gap-3 font-bold hover:bg-slate-50 transition-all">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-6" alt="G"> Google Account
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
            authDomain: "placement-96094.firebaseapp.com",
            databaseURL: "https://placement-96094-default-rtdb.firebaseio.com",
            projectId: "placement-96094",
            storageBucket: "placement-96094.firebasestorage.app",
            messagingSenderId: "1061247846675",
            appId: "1:1061247846675:web:c6885811fcf1884582b2e6"
        };

        // Init
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 1. UI & AUTH EXPOSURE
        window.toggleModal = () => {
            const m = document.getElementById('loginModal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        };

        window.handleGoogleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.toggleModal();
            } catch (e) { console.error(e); alert("Login failed. Use a local server!"); }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.toggleModal();
            } catch (e) { alert(e.message); }
        };

        window.handleLogout = () => signOut(auth);

        // 2. ADMIN AUTHORITY (Use these in Console)
        window.adminCreateBatch = async (name, desc, price) => {
            const batchRef = push(ref(db, 'premium_batches'));
            await set(batchRef, {
                id: batchRef.key,
                name,
                description: desc,
                price,
                createdAt: Date.now()
            });
            console.log("Batch Created! ID:", batchRef.key);
        };

        window.addSubjectToBatch = async (batchId, subjectName) => {
            const subRef = push(ref(db, `curriculum/${batchId}/subjects`));
            await set(subRef, { id: subRef.key, title: subjectName });
            console.log("Subject Added to", batchId);
        };

        // 3. LISTENERS
        onAuthStateChanged(auth, (user) => {
            const authDiv = document.getElementById('auth-state');
            if (user) {
                authDiv.innerHTML = `
                    <div class="flex items-center gap-3 bg-white border border-slate-200 p-2 pr-5 rounded-full shadow-sm">
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name=User'}" class="w-9 h-9 rounded-full border-2 border-blue-100">
                        <div class="flex flex-col">
                            <span class="text-xs font-black text-slate-400 leading-none">STUDENT</span>
                            <span class="text-sm font-bold text-slate-900 leading-tight">My Portal</span>
                        </div>
                        <button onclick="handleLogout()" class="ml-2 text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                    </div>`;
            } else {
                authDiv.innerHTML = `
                    <button onclick="toggleModal()" class="text-slate-600 font-bold px-4 hover:text-blue-700 transition-colors">Login</button>
                    <button onclick="toggleModal()" class="bg-blue-700 text-white px-8 py-3 rounded-full font-black shadow-lg shadow-blue-100 hover:bg-blue-800 hover:-translate-y-0.5 transition-all">Enroll Now</button>`;
            }
            lucide.createIcons();
        });

        // 4. LOAD BATCHES
        onValue(ref(db, 'premium_batches'), (snapshot) => {
            const container = document.getElementById('batches-container');
            const data = snapshot.val();
            if (!data) {
                container.innerHTML = `<div class="col-span-full py-20 text-center bg-white rounded-[3rem] border border-dashed border-slate-200 text-slate-400 font-medium">🚀 No batches live yet. Check console to create one!</div>`;
                return;
            }
            container.innerHTML = Object.values(data).map(b => `
                <div class="glass-card p-8 rounded-[3rem] flex flex-col h-full bg-white">
                    <div class="bg-blue-50 text-blue-600 w-16 h-16 rounded-3xl flex items-center justify-center mb-8"><i data-lucide="layers" class="w-8 h-8"></i></div>
                    <h3 class="text-2xl font-black text-slate-900 mb-3">${b.name}</h3>
                    <p class="text-slate-500 font-medium mb-10 leading-relaxed flex-grow">${b.description}</p>
                    <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                        <div>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Fee Plan</span>
                            <span class="text-3xl font-black text-blue-600">₹${b.price}</span>
                        </div>
                        <button class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all active:scale-95">Join Batch</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        });

        lucide.createIcons();
    </script>
</body>
</html>
