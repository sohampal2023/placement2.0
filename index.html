<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GovtPrep Premium | AE & JE Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .pw-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-700 p-2 rounded-xl text-white shadow-lg">
                        <i data-lucide="zap"></i>
                    </div>
                    <span class="text-xl font-black text-slate-900 tracking-tight">GOVTPREP<span class="text-blue-600">.PRO</span></span>
                </div>
                
                <div id="auth-state" class="flex items-center gap-4">
                    <div class="animate-pulse bg-slate-200 h-10 w-24 rounded-full"></div>
                </div>
            </div>
        </div>
    </nav>

    <section class="pw-gradient text-white pt-20 pb-32 relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 relative z-10">
            <div class="text-center">
                <div class="inline-block px-4 py-1.5 mb-6 bg-blue-500/20 border border-blue-400/30 rounded-full text-blue-200 text-sm font-bold uppercase">
                    Trusted by 50,000+ AE/JE Aspirants
                </div>
                <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">Your Success Is Our <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-indigo-200">Mission, Not Business.</span></h1>
                <p class="text-lg text-blue-100/80 max-w-2xl mx-auto mb-10">Access premium AE/JE coaching at the most affordable price in India. High-quality lectures, notes, and test series.</p>
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <button class="bg-white text-blue-900 px-10 py-4 rounded-2xl font-bold shadow-2xl hover:bg-slate-100 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="play-circle"></i> Start Learning Now
                    </button>
                    <button class="bg-blue-600/30 border border-white/20 px-10 py-4 rounded-2xl font-bold hover:bg-blue-600/50 transition-all">
                        View Test Series
                    </button>
                </div>
            </div>
        </div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-400/10 rounded-full blur-3xl"></div>
    </section>

    <section class="max-w-7xl mx-auto px-4 -mt-16 relative z-20">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="batches-container">
            <div class="glass-card p-6 rounded-3xl shadow-xl animate-pulse h-64 bg-white/50"></div>
            <div class="glass-card p-6 rounded-3xl shadow-xl animate-pulse h-64 bg-white/50"></div>
            <div class="glass-card p-6 rounded-3xl shadow-xl animate-pulse h-64 bg-white/50"></div>
        </div>
    </section>

    <div id="loginModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl scale-95 transition-transform duration-300">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-slate-800">Login to Study</h2>
                <p class="text-slate-500 mt-2">Enter your details to access your batches</p>
            </div>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email Address" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border-none focus:ring-2 focus:ring-blue-600">
                <input id="password" type="password" placeholder="Password" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border-none focus:ring-2 focus:ring-blue-600">
                <button onclick="handleLogin()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-800 transition-all">Continue</button>
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">Or use social</span></div>
                </div>
                <button onclick="handleGoogleLogin()" class="w-full border border-slate-200 py-4 rounded-2xl flex items-center justify-center gap-3 font-semibold hover:bg-slate-50 transition-all">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5" alt="G"> Google Account
                </button>
            </div>
        </div>
    </div>

    <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
    authDomain: "placement-96094.firebaseapp.com",
    databaseURL: "https://placement-96094-default-rtdb.firebaseio.com",
    projectId: "placement-96094",
    storageBucket: "placement-96094.firebasestorage.app",
    messagingSenderId: "1061247846675",
    appId: "1:1061247846675:web:c6885811fcf1884582b2e6"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
import { getDatabase, ref, set, push, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const db = getDatabase(app);
const auth = getAuth(app);
        lucide.createIcons();
    async function createBatch(name, description, price, imageUrl) {
  const batchRef = ref(db, 'premium_batches');
  const newBatchRef = push(batchRef); // Generates unique ID
  
  await set(newBatchRef, {
    batchId: newBatchRef.key,
    name: name,
    description: description,
    price: price,
    thumbnail: imageUrl,
    createdAt: Date.now()
  });
  console.log("Batch Created ID:", newBatchRef.key);
}
        async function addSubject(batchId, subjectName) {
  const subjectRef = ref(db, `curriculum/${batchId}/subjects`);
  const newSubjectRef = push(subjectRef);
  
  await set(newSubjectRef, {
    subjectId: newSubjectRef.key,
    title: subjectName,
    chapterCount: 0
  });
}
        async function addTopic(batchId, subjectId, chapterName, topicData) {
  // Path: curriculum > batchId > subjects > subjectId > chapters > chapterName > topics
  const topicRef = push(ref(db, `curriculum/${batchId}/subjects/${subjectId}/chapters/${chapterName}/topics`));
  
  await set(topicRef, {
    topicId: topicRef.key,
    title: topicData.title,     // e.g., "Ohm's Law"
    videoUrl: topicData.video,  // YouTube/Drive Link
    notesUrl: topicData.pdf,    // Drive/Firebase Storage Link
    type: topicData.type        // 'free' or 'premium'
  });
}
        // 2. AUTH LOGIC
        auth.onAuthStateChanged(user => {
            const authDiv = document.getElementById('auth-state');
            if (user) {
                authDiv.innerHTML = `
                    <div class="flex items-center gap-3 bg-slate-100 p-1.5 pr-4 rounded-full">
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name='+user.email}" class="w-8 h-8 rounded-full">
                        <span class="text-sm font-bold text-slate-700">Dashboard</span>
                        <button onclick="auth.signOut()" class="text-slate-400 hover:text-red-500"><i data-lucide="log-out" class="w-4"></i></button>
                    </div>`;
            } else {
                authDiv.innerHTML = `
                    <button onclick="toggleModal()" class="text-blue-700 font-bold px-4">Login</button>
                    <button onclick="toggleModal()" class="bg-blue-700 text-white px-6 py-2.5 rounded-full font-bold shadow-lg hover:shadow-blue-200 transition-all">Get Batch</button>`;
            }
            lucide.createIcons();
        });

        function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => toggleModal());
        }

        function toggleModal() {
            const m = document.getElementById('loginModal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        // 3. FETCH DYNAMIC BATCHES (Realtime Database)
        function loadBatches() {
            const batchContainer = document.getElementById('batches-container');
            
            db.ref('premium_batches').on('value', (snapshot) => {
                const batches = snapshot.val();
                if (!batches) {
                    batchContainer.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400 italic">No batches live today. Check back later!</div>`;
                    return;
                }

                let html = '';
                Object.keys(batches).forEach(key => {
                    const b = batches[key];
                    html += `
                        <div class="glass-card p-6 rounded-3xl shadow-xl hover:scale-105 transition-all bg-white group cursor-pointer">
                            <div class="bg-blue-100 text-blue-700 w-12 h-12 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-blue-700 group-hover:text-white transition-colors">
                                <i data-lucide="book-open"></i>
                            </div>
                            <h3 class="text-xl font-bold text-slate-800 mb-2">${b.name}</h3>
                            <p class="text-sm text-slate-500 mb-6">${b.description}</p>
                            <div class="flex justify-between items-center mt-auto pt-4 border-t border-slate-100">
                                <span class="text-2xl font-black text-slate-900">₹${b.price}</span>
                                <button class="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-bold">Buy Now</button>
                            </div>
                        </div>`;
                });
                batchContainer.innerHTML = html;
                lucide.createIcons();
            });
        }

        // Initialize
        loadBatches();
    </script>
</body>
</html>
