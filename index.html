<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamMaster Pro 2.0 | Security & Viva Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }

        .live-indicator { animation: pulse-red 2s infinite; }

<body class="bg-slate-100 font-sans text-slate-900 leading-relaxed">

        </section>

        <section id="admin-panel" class="hidden space-y-8 animate-in slide-in-from-bottom-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                </div>
            </div>
            <button onclick="window.openInterviewManager()">INTERVIEW CENTER</button>
            <div id="admin-main-view"></div>
        </section>

        <section id="student-dash" class="hidden">
            <div class="max-w-4xl mx-auto bg-white p-12 rounded-[3rem] border-4 border-blue-50 text-center shadow-inner">
                <div id="test-list-area"></div>
            </div>
            <button onclick="window.startInterviewSession()">JOIN INTERVIEW</button>
        </section>

        <section id="exam-ui" class="hidden fixed inset-0 z-[200] bg-slate-50 overflow-y-auto">
            <div class="max-w-6xl mx-auto p-8">
                <div class="flex justify-between items-center mb-8">
                    <div class="bg-blue-950 text-white px-6 py-3 rounded-2xl font-black italic shadow-lg">PROCTORING ACTIVE</div>
                    <div id="timer" class="text-4xl font-black text-red-600 font-mono bg-white px-8 py-3 rounded-2xl shadow-xl border-b-4 border-red-100">90:00</div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="lg:col-span-2">
                        <div class="bg-white p-12 rounded-[3rem] shadow-2xl border-b-8 border-blue-100 mb-8">
                            <p id="display-q-text" class="text-2xl font-bold text-slate-800 leading-snug tracking-tighter italic">Waiting for question...</p>
                        </div>
                        
                        <div class="space-y-4">
                            <h5 class="text-xs font-black uppercase text-slate-400 tracking-widest ml-4">Candidate Answer / Transcript</h5>
                            <textarea id="answer-transcript" placeholder="Start speaking or type your answer here..." class="w-full h-48 p-6 bg-white rounded-[2rem] border-2 border-slate-100 shadow-inner outline-none focus:border-blue-500 font-medium"></textarea>
                            <button onclick="window.submitAnswer()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">SUBMIT RESPONSE</button>
                        </div>
                    </div>
                    <div class="space-y-8">
                        <div class="relative">
                            <video id="camera-feed" autoplay muted class="w-full h-48 bg-black rounded-[2rem] border-4 border-red-500 shadow-2xl object-cover"></video>
                            <div class="absolute top-4 left-4 bg-red-600 text-white text-[8px] font-black px-2 py-1 rounded-full animate-pulse tracking-widest uppercase">Live Proctor</div>
                        </div>
                        <div class="bg-red-50 p-6 rounded-2xl border-2 border-red-100">
                            <h5 class="text-red-600 font-black text-[10px] uppercase mb-2">Security Violations</h5>
                            <p id="violation-count" class="text-2xl font-black text-red-600">0</p>
                            <p class="text-[8px] text-red-400 font-bold">TAB SWITCHING DETECTED BY AI</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        import { getDatabase, ref, set, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKqBYNRY_80b_UOLg1ls9pIKdX-Y8b3CM",
            authDomain: "placement-96094.firebaseapp.com",
            databaseURL: "https://placement-96094-default-rtdb.firebaseio.com",
            projectId: "placement-96094",
            storageBucket: "placement-96094.firebasestorage.app",
            messagingSenderId: "1061247846675",
            appId: "1:1061247846675:web:c6885811fcf1884582b2e6"

        const app = initializeApp(firebaseConfig);

        window.currentStudent = null;
        window.violationCount = 0;

        // AUTH & DASHBOARD
        window.portalLogin = async () => {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            if (id === "admin@admin.com") {
                try {
                    await signInWithEmailAndPassword(auth, id, pass);
                    window.showPanel('admin-panel');
                    window.openInterviewTab();
                } catch (e) { alert("Admin Error: " + e.message); }
            } else {
                onValue(ref(db, `verified_students/${id}`), (snap) => {
                    const s = snap.val();
                    if (s && s.password === pass) {
                        window.currentStudent = { id, ...s };
                        window.showPanel('student-dash');
                        document.getElementById('student-name-display').innerText = s.name;
                        window.listenForTests(id);
                    }
                }, { onlyOnce: true });
            }
        };

        // ADMIN: INTERVIEW TAB (COMBINED)
        window.openInterviewTab = () => {
            const container = document.getElementById('admin-main-view');
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in fade-in">
                    <div class="bg-black p-8 rounded-[2rem] border-b-8 border-red-600 shadow-2xl">
                        <p class="text-red-500 text-[10px] font-black mb-4 uppercase animate-pulse">● LIVE GHOST VIVA</p>
                        <textarea id="ghost-msg" placeholder="Speak through AI..." class="w-full h-32 bg-slate-900 text-blue-400 p-4 rounded-2xl mb-4 border-none outline-none focus:ring-2 ring-blue-500"></textarea>
                        <button onclick="window.sendGhostMsg()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs">SPEAK NOW</button>
                        
                        <div class="mt-8 bg-slate-900 p-4 rounded-2xl border border-slate-800">
                            <h4 class="text-[8px] text-slate-500 uppercase font-black mb-4">Candidate Answer Log</h4>
                            <div id="admin-transcript-view" class="h-40 overflow-y-auto text-white text-[10px] font-mono italic">Waiting for student response...</div>
                        </div>
                    </div>

                    <div class="lg:col-span-2 bg-white p-10 rounded-[2rem] shadow-xl border-t-8 border-blue-600">
                        <h3 class="text-xl font-black mb-6 italic uppercase">Live Candidate Roster</h3>
                        <div id="student-roster" class="min-h-[400px]"></div>
                    </div>
                </div>
            `;
            window.loadStudentRoster();
        };

        // GHOST VIVA LOGIC
        window.sendGhostMsg = () => {
            const msg = document.getElementById('ghost-msg').value;
            if (msg) {
                set(ref(db, 'live_interviews/current_qn'), { text: msg, timestamp: Date.now() });
                document.getElementById('ghost-msg').value = "";
            }
        };

        // STUDENT: VIVA ROOM & TRANSCRIPT
        window.startInterview = () => {
            window.showPanel('exam-ui');
            window.initProctor();
            window.startTabTracking(); // Fixed Proctoring

            // Listen for Admin Questions
            onValue(ref(db, 'live_interviews/current_qn'), (snap) => {
                const q = snap.val();
                if (q) {
                    document.getElementById('display-q-text').innerText = q.text;
                    const speech = new SpeechSynthesisUtterance(q.text);
                    window.speechSynthesis.speak(speech);
                }
            });
        };

        window.submitAnswer = () => {
            const ans = document.getElementById('answer-transcript').value;
            if (ans && window.currentStudent) {
                set(ref(db, `live_interviews/responses/${window.currentStudent.id}`), {
                    name: window.currentStudent.name,
                    text: ans,
                    time: new Date().toLocaleTimeString()
                });
                document.getElementById('answer-transcript').value = "";
            }
        };

        // ADMIN: LISTEN TO TRANSCRIPTS
        onValue(ref(db, 'live_interviews/responses'), (snap) => {
            const log = document.getElementById('admin-transcript-view');
            if (log && snap.val()) {
                const data = snap.val();
                log.innerHTML = Object.values(data).map(r => `
                    <div class="mb-2 p-2 bg-slate-800 rounded">
                        <span class="text-blue-400 font-bold">[${r.name}]</span>: ${r.text}
                    </div>
                `).join('');
                log.scrollTop = log.scrollHeight;
            }
        });

        // FIXED PROCTORING: TAB SWITCHING
        window.startTabTracking = () => {
            window.violationCount = 0;
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    window.violationCount++;
                    document.getElementById('violation-count').innerText = window.violationCount;
                    // Sync Violation to Firebase
                    if (window.currentStudent) {
                        push(ref(db, `proctor_logs/${window.currentStudent.id}`), {
                            action: "TAB_SWITCH",
                            count: window.violationCount,
                            time: new Date().toLocaleTimeString()
                        });
                    }
                    alert("SECURITY WARNING: Tab switching is strictly prohibited!");
                }
            });
        };

        // ROSTER & PANEL HELPERS
        window.showPanel = (pid) => {
            ['auth-container', 'student-dash', 'admin-panel', 'exam-ui'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.add('hidden');
            });
            document.getElementById(pid).classList.remove('hidden');
        };

        // --- 1. MASTER UI RE-WIRING ---
// This ensures that clicking the big blue/purple cards actually loads the functions

                <button onclick="window.sendGhostMsg()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs hover:bg-blue-500 transition">SPEAK NOW</button>

                    <h4 class="text-[8px] text-slate-500 uppercase font-black mb-4">Candidate Answer Log</h4>
                    <div id="admin-transcript-view" class="h-40 overflow-y-auto text-white text-[10px] font-mono italic">
                        Waiting for student response...
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-10 rounded-[2rem] shadow-xl border-t-8 border-blue-600">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black italic uppercase">LIVE CANDIDATE ROSTER</h3>
                    <button onclick="window.loadStudentRoster()" class="text-[10px] bg-slate-50 px-4 py-2 rounded-xl font-black">REFRESH</button>

// --- 2. THE GHOST VOICE LOGIC ---
window.sendGhostMsg = () => {
    const msg = document.getElementById('ghost-msg').value;
    if (msg) {
        // Pushes the message to Firebase so the student's browser speaks it
        set(ref(db, 'live_interviews/current_qn'), { 
            text: msg, 
            timestamp: Date.now() 
        }).then(() => {
            document.getElementById('ghost-msg').value = "";
        });
    }
};

// --- 3. THE ROSTER SYNC LOGIC ---
window.loadStudentRoster = () => {
    onValue(ref(db, 'verified_students'), (snap) => {
        const rosterContainer = document.getElementById('student-roster');
        if(!rosterContainer) return;
        
        const students = snap.val();
        if(!students) {
            rosterContainer.innerHTML = "<p class='text-center text-slate-400 py-10 italic'>No candidates found.</p>";
            return;
        }

        let html = `
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="text-slate-400 border-b uppercase font-black">
                        <th class="p-4">Name/ID</th>
                        <th class="p-4 text-center">Viva</th>
                        <th class="p-4 text-center">CBT</th>
                    </tr>
                </thead>
                <tbody>`;
        
        for (let id in students) {
            const s = students[id];
            html += `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-4">
                        <div class="font-bold text-slate-800">${s.name}</div>
                        <div class="text-blue-500 font-mono text-[10px]">${id}</div>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="window.toggleStatus('${id}', 'int')" class="px-3 py-1 rounded font-black text-[10px] ${s.int_enabled ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-400'}">
                            ${s.int_enabled ? 'ON' : 'OFF'}
                        </button>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="window.toggleStatus('${id}', 'cbt')" class="px-3 py-1 rounded font-black text-[10px] ${s.cbt_enabled ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}">
                            ${s.cbt_enabled ? 'ON' : 'OFF'}
                        </button>
                    </td>
                </tr>`;
        }
        rosterContainer.innerHTML = html + "</tbody></table>";
    });
};

// --- 4. TOGGLE ACCESS (ON/OFF BUTTONS) ---
window.toggleStatus = (id, type) => {
    const key = type === 'int' ? 'int_enabled' : 'cbt_enabled';
    // Single lookup to flip the boolean value in Firebase
    onValue(ref(db, `verified_students/${id}/${key}`), (snap) => {
        update(ref(db, `verified_students/${id}`), { [key]: !snap.val() });
    }, { onlyOnce: true });
};

        window.toggleStatus = (id, type) => {
            const key = type === 'int' ? 'int_enabled' : 'cbt_enabled';
            onValue(ref(db, `verified_students/${id}/${key}`), (snap) => {
                update(ref(db, `verified_students/${id}`), { [key]: !snap.val() });
            }, { onlyOnce: true });
        };

        window.listenForTests = (sId) => {
            onValue(ref(db, 'active_test_config'), (snap) => {
                const config = snap.val();
                if(!config) return;
                onValue(ref(db, `verified_students/${sId}`), (sSnap) => {
                    const s = sSnap.val();
                    const area = document.getElementById('test-list-area');
                    let btn = "";
                    if (config.type === 'VIVA' && s.int_enabled) {
                        btn = `<button onclick="window.startInterview()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl">JOIN LIVE INTERVIEW</button>`;
                    }
                    area.innerHTML = `<h3 class="text-3xl font-black mb-6 uppercase italic">${config.name}</h3>${btn || '<p class="text-red-500 font-black">Wait for Admin Auth...</p>'}`;
                });
            });
        };

        window.initProctor = async () => {
            try { const s = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById('camera-feed').srcObject = s; } catch (e) {}
        };

        window.portalLogout = () => { signOut(auth).then(() => location.reload()); };
        window.openInterviewManager = () => {
    const adminView = document.getElementById('admin-panel');
    adminView.innerHTML = `
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-indigo-50">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">

        window.startInterviewSession = async () => {
    try {
        // 1. Force Full Screen Share
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        window.showPanel('exam-ui');
        
        // 2. Start Voice Transcript
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
            const transcript = Array.from(event.results).map(r => r[0].transcript).join('');
            document.getElementById('answer-transcript').value = transcript;
            
            // Sync transcript to Admin in real-time
            update(ref(db, `live_interviews/transcripts/${window.currentStudent.id}`), {
                text: transcript,
                timestamp: Date.now()
            });
        };
        recognition.start();

    } catch (err) {
        alert("You must share your entire screen to enter the interview!");
        location.reload();
    }
};
        window.syncLiveMarks = () => {
    const sId = document.getElementById('target-student-id').value;
    const score = document.getElementById('live-deduction').value;
    const reason = document.getElementById('deduction-reason').value;

    if(!sId || !score) return alert("Select student and score!");

    update(ref(db, `live_interviews/live_marks/${sId}`), {
        marks: score,
        reason: reason,
        time: new Date().toLocaleTimeString()
    }).then(() => {
        document.getElementById('live-deduction').value = "";
        document.getElementById('deduction-reason').value = "";
    });
};

    }).then(() => {
        remove(ref(db, `enrollment_requests/${requestKey}`));

    });
};

// --- 2. FIXED: FINALIZE CBT LOGIC ---
window.finalizeCBTSetup = async (type) => {
    const name = document.getElementById('setup-test-name').value;
    const rawText = document.getElementById('bulk-question-input').value;
    const duration = document.getElementById('setup-duration').value;
    const marks = document.getElementById('setup-marks').value;

    if(!name || !rawText) return alert("Please fill all fields!");

    // Parse questions: splits by number + dot (1. or 2.)
    const qBlocks = rawText.split(/\d+\./).filter(b => b.length > 5);
    const bankId = `BANK_${Date.now()}`;

    // Upload questions to bank
    for (let block of qBlocks) {
        await push(ref(db, `question_bank/${bankId}`), { 
            content: block.trim(),
            timestamp: Date.now() 
        });
    }

    // Activate the test globally
    set(ref(db, 'active_test_config'), {
        type: type,
        name: name,
        bank: bankId,
        duration: duration,
        marksPerQ: marks,
        status: "LIVE",
        timestamp: Date.now()
    }).then(() => {
        alert(`${type} activated with ${qBlocks.length} questions!`);
        window.renderAdminDashboard();
        window.loadStudentRoster();
    });
};

window.broadcastInterviewConfig = () => {

    }).then(() => alert("Interview Config Pushed. Student can now join."));
};
